<section id="tab-connection" class="tab-page active">
  <div class="page-grid two-col">
    <article class="card">
      <div class="card-head">
        <div>
          <div class="card-kicker">Placa conectada</div>
          <h3>Identificacao e recursos</h3>
        </div>
      </div>
      <div class="metric-grid">
        <div class="metric-box">
          <span>Firmware</span>
          <strong id="connectionFirmware">-</strong>
        </div>
        <div class="metric-box">
          <span>Placa</span>
          <strong id="connectionBoard">-</strong>
        </div>
        <div class="metric-box">
          <span>Porta ativa</span>
          <strong id="connectionActivePort">-</strong>
        </div>
        <div class="metric-box">
          <span>VID:PID</span>
          <strong id="connectionVidPid">-</strong>
        </div>
        <div class="metric-box">
          <span>Estado</span>
          <strong id="connectionState">-</strong>
        </div>
        <div class="metric-box">
          <span>Encoder</span>
          <strong id="connectionEncoder">-</strong>
        </div>
        <div class="metric-box">
          <span>Saida</span>
          <strong id="connectionOutput">-</strong>
        </div>
        <div class="metric-box">
          <span>Botoes</span>
          <strong id="connectionButtons">-</strong>
        </div>
      </div>
      <div id="connectionHint" class="note-panel">Use o botao do rodape para conectar a base e preencher os dados desta tela.</div>
      <div id="connectionDetails" class="note-stack mt-3"></div>
    </article>

    <article class="card">
      <div class="card-head">
        <div>
          <div class="card-kicker">Ferramentas</div>
          <h3>Firmware e utilitarios</h3>
        </div>
      </div>
      <div class="inline-actions">
        <button id="connectionRefreshSnapshot" class="app-btn secondary">Recarregar snapshot</button>
        <button id="connectionOpenFirmware" class="app-btn primary">Gravar firmware</button>
      </div>
      <div id="connectionTools" class="tool-grid mt-3"></div>
    </article>
  </div>
</section>
