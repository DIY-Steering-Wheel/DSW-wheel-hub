<section id="tab-ffb" class="tab-page">
  <div class="page-grid">
    <article class="card">
      <div class="card-head">
        <div class="ffb-hero">
          <div>
            <div class="card-kicker">Force Feedback</div>
            <h3>Centro de ajuste do FFB</h3>
            <p class="card-subtitle">Ganhos principais aqui na frente. Saida, byte E e eixo ficam na engrenagem para a tela respirar melhor.</p>
          </div>
          <button id="ffbOpenOutputModal" class="app-btn secondary shell-icon-btn" title="Abrir configuracoes de saida"><i class="bi bi-gear-fill"></i></button>
        </div>
      </div>
      <div class="ffb-summary-grid">
        <div class="metric-box">
          <span>Saida atual</span>
          <strong id="ffbOutputSummary">-</strong>
        </div>
        <div class="metric-box">
          <span>Eixo FFB</span>
          <strong id="ffbAxisSummary">-</strong>
        </div>
        <div class="metric-box">
          <span>Desktop effects</span>
          <strong id="ffbEffectsSummary">-</strong>
        </div>
      </div>
      <div class="slider-grid slider-grid-ffb">
        <div class="slider-card"><div class="slider-row"><label>Geral</label><input id="ffbGeneralRange" type="range" min="0" max="200" step="1"><input id="ffbGeneral" type="number" min="0" max="200"></div></div>
        <div class="slider-card"><div class="slider-row"><label>Constante</label><input id="ffbConstantRange" type="range" min="0" max="200" step="1"><input id="ffbConstant" type="number" min="0" max="200"></div></div>
        <div class="slider-card"><div class="slider-row"><label>Damper</label><input id="ffbDamperRange" type="range" min="0" max="200" step="1"><input id="ffbDamper" type="number" min="0" max="200"></div></div>
        <div class="slider-card"><div class="slider-row"><label>Friction</label><input id="ffbFrictionRange" type="range" min="0" max="200" step="1"><input id="ffbFriction" type="number" min="0" max="200"></div></div>
        <div class="slider-card"><div class="slider-row"><label>Periodic</label><input id="ffbPeriodicRange" type="range" min="0" max="200" step="1"><input id="ffbPeriodic" type="number" min="0" max="200"></div></div>
        <div class="slider-card"><div class="slider-row"><label>Spring</label><input id="ffbSpringRange" type="range" min="0" max="200" step="1"><input id="ffbSpring" type="number" min="0" max="200"></div></div>
        <div class="slider-card"><div class="slider-row"><label>Inertia</label><input id="ffbInertiaRange" type="range" min="0" max="200" step="1"><input id="ffbInertia" type="number" min="0" max="200"></div></div>
        <div class="slider-card"><div class="slider-row"><label>Auto-center</label><input id="ffbCenterRange" type="range" min="0" max="200" step="1"><input id="ffbCenter" type="number" min="0" max="200"></div></div>
        <div class="slider-card"><div class="slider-row"><label>End stop</label><input id="ffbStopRange" type="range" min="0" max="200" step="1"><input id="ffbStop" type="number" min="0" max="200"></div></div>
        <div class="slider-card"><div class="slider-row"><label>Min torque</label><input id="ffbMinTorqueRange" type="range" min="0" max="200" step="1"><input id="ffbMinTorque" type="number" min="0" max="200"></div></div>
      </div>
      <div class="inline-actions">
        <button id="ffbApplyGains" class="app-btn primary">Aplicar ganhos FFB</button>
        <button id="ffbResetDraft" class="app-btn secondary">Descartar alteracoes locais</button>
      </div>
    </article>
  </div>
</section>
